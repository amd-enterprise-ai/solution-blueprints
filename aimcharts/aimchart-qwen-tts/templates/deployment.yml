{{- define "aimchart-qwen-tts.deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aimchart-qwen-tts.release.fullname" . }}
  labels:
    app: {{ include "aimchart-qwen-tts.release.fullname" . }}
    {{- range $key, $value := .Values.metadata.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "aimchart-qwen-tts.release.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "aimchart-qwen-tts.release.fullname" . }}
    spec:
      hostIPC: {{ .Values.hostIPC }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "aimchart-qwen-tts.release.name" . }}
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy | default "Always" | quote }}
          command:
            - vllm
          args:
            - serve
            - {{ .Values.model }}
            - --port
            - {{ default 8091 .Values.service.targetPort | quote }}
            {{- range .Values.extraArgs }}
            - {{ . }}
            {{- end }}
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          ports:
            - containerPort: {{ default 8091 .Values.service.targetPort }}
              name: http
          startupProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 10
            failureThreshold: 360
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
          resources:
            requests:
              amd.com/gpu: {{ .Values.gpus | quote }}
              {{- if .Values.resources.requests }}
              {{- toYaml .Values.resources.requests | nindent 14 }}
              {{- end }}
            limits:
              amd.com/gpu: {{ .Values.gpus | quote }}
              {{- if .Values.resources.limits }}
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{- end }}
          {{- if .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
{{- end }}

{{- if not .Values.existingService }}
{{ include "aimchart-qwen-tts.deployment" . }}
{{- end }}
