suite: platform selection
templates:
  - deployment.yml
tests:
  - it: should default to "instinct"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/amdenterpriseai/aim-base:0.12
      - equal:
          path: spec.template.spec.containers[0].resources.requests["amd.com/gpu"]
          value: "1"
      - notExists:
          path: spec.template.spec.containers[0].args

  - it: should pick up global.platform if platform is not defined
    set:
      global.platform: epyc
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/amdenterpriseai/aim-epyc-base:0.11
      - equal:
          path: spec.template.spec.containers[0].args
          value: [--dtype, bfloat16]
      - equal:
          path: spec.template.spec.containers[0].resources.limits
          value:
            cpu: "188"
            memory: "128Gi"
      - notExists:
          path: spec.template.spec.containers[0].resources.requests["amd.com/gpu"]
  - it: should give precedence to platform over global.platform
    set:
      global.platform: "instinct"
      platform: epyc
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/amdenterpriseai/aim-epyc-base:0.11
      - equal:
          path: spec.template.spec.containers[0].resources.limits
          value:
            cpu: "188"
            memory: "128Gi"
      - notExists:
          path: spec.template.spec.containers[0].resources.requests["amd.com/gpu"]
  - it: should allow user to override defaults
    set:
      platform: epyc
      image: my-custom-image
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-custom-image
      - notExists:
          path: spec.template.spec.containers[0].resources.requests["amd.com/gpu"]

  - it: should default HF_HOME when env_vars is not set
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HF_HOME
            value: "/workload/.cache/huggingface"

  - it: should merge user provided env_vars into the container
    set:
      env_vars:
        HF_HOME: "/custom/cache"
        MY_CUSTOM_VAR: "hello"
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HF_HOME
            value: "/custom/cache"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_VAR
            value: "hello"

  - it: should render secretKeyRef env_vars
    set:
      env_vars:
        HF_TOKEN:
          name: hf-token
          key: hf-token
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token
                key: hf-token

  - it: should not render env when env_vars is empty
    set:
      platformDefaults.instinct.env_vars: null
      env_vars: null
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.template.spec.containers[0].env
