{{- $pv := include "aimchart-embedding.platformValues" . | fromYaml -}}
{{- $ctx := merge (dict "Values" $pv) (omit . "Values") -}}
{{- with $ctx -}}

{{- if not .Values.existingService }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aim-embedding.release.fullname" . }}
  labels:
    app: {{ include "aim-embedding.release.fullname" . }}
    {{- range $key, $value := .Values.metadata.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "aim-embedding.release.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "aim-embedding.release.fullname" . }}
    spec:
      containers:
      - name: aim-embedding
        image: "{{ .Values.image }}"
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        {{- if .Values.deployment.command }}
        command:
          {{- toYaml .Values.deployment.command | nindent 10 }}
          - {{ .Values.model | quote }}
          - --port
          - {{ .Values.deployment.ports.http | quote }}
        {{- end }}
        {{- if .Values.deployment.args }}
        args:
          {{- toYaml .Values.deployment.args | nindent 10 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.deployment.ports.http }}
        {{- if .Values.env_vars }}
        env:
          {{- include "aim-embedding.container.env" . | nindent 10 }}
        {{- end }}
        {{- $port := .Values.deployment.ports.http }}
        {{- with .Values.startupProbe }}
        startupProbe:
          {{- $probe := deepCopy . }}
          {{- if and $probe.httpGet (not $probe.httpGet.port) }}
          {{- $_ := set $probe.httpGet "port" $port }}
          {{- end }}
          {{- toYaml $probe | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- $probe := deepCopy . }}
          {{- if and $probe.httpGet (not $probe.httpGet.port) }}
          {{- $_ := set $probe.httpGet "port" $port }}
          {{- end }}
          {{- toYaml $probe | nindent 10 }}
        {{- end }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- $probe := deepCopy . }}
          {{- if and $probe.httpGet (not $probe.httpGet.port) }}
          {{- $_ := set $probe.httpGet "port" $port }}
          {{- end }}
          {{- toYaml $probe | nindent 10 }}
        {{- end }}
        resources:
          requests:
            {{- toYaml .Values.resources.requests | nindent 12 }}
            {{- if .Values.gpus }}
            amd.com/gpu: "{{ .Values.gpus }}"
            {{- end }}
          limits:
            {{- toYaml .Values.resources.limits | nindent 12 }}
            {{- if .Values.gpus }}
            amd.com/gpu: "{{ .Values.gpus }}"
            {{- end }}
        volumeMounts:
          {{- include "aim-embedding.container.volumeMounts" . | nindent 10 }}
      volumes:
        {{- include "aim-embedding.container.volumes" . | nindent 8 }}
{{- end -}}

{{- end -}}
