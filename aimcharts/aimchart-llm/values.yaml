# platform defaults are filled in when the key is missing at the top level.
platformDefaults:
  instinct:
    platform: instinct
    image: "docker.io/amdenterpriseai/aim-meta-llama-llama-3-1-8b-instruct:0.11.1"
    gpus: 1
    memory_per_gpu: 64
    cpu_per_gpu: 4
    env_vars: {}
  epyc:
    platform: epyc
    image: "docker.io/amdenterpriseai/aim-epyc-meta-llama-llama-3-1-8b-instruct:0.11.0-preview"
    gpus: 0
    cpus: 188
    memory: 128
    env_vars:
      AIM_PRECISION: "bf16"
      AIM_ALLOW_UNOPTIMIZED: "true"
  radeon:
    platform: radeon
    image: "docker.io/amdenterpriseai/aim-radeon-qwen-qwen3-vl-8b-instruct:0.12.0-preview"
    gpus: 1
    memory_per_gpu: 32
    cpu_per_gpu: 4
    env_vars: {}

existingService: null  # Specify this to override the whole implementation, and use an existing service instead

nameOverride: null
fullnameOverride: null
metadata:
  labels: {}
  project_id: null
  user_id: null
  workload_id: null # defaults to the release name

replicas: 1
imagePullSecrets: []
  # Example:
  # - name: ghcr-regcred

env_vars: {}
  # Available AIM Environment Variables:
  #
  # You may provide a HuggingFace token that's stored in a Secret called `hf-token` in the key `hf-token` by adding:
  # HF_TOKEN:
  #   key: hf-token
  #   name: hf-token

storage:
  ephemeral:
    quantity: 256Gi
    # Omit storageClassName and accessModes to fall back to ephemeral storage
    storageClassName: mlstorage
    accessModes:
      - ReadWriteOnce
  dshm:
    sizeLimit: 32Gi

kaiwo:
  enabled: false

customProfiles: {} # Example custom profile below (top key is the filename)
  # vllm-mi300x-fp16-tp1-latency-custom.yaml:
  #   aim_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
