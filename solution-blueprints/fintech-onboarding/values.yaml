http_route:
  enabled: false
  gateway:
    name: https
    namespace: kgateway-system

replicaCount: 1

images:
  pythonBase: python:3.10-slim
  rocmPythonBase: "rocm/dev-ubuntu-22.04:6.2-complete"
ports:
  fintech: 8000
  ui: 8080

amdGpu:
  # Number of AMD GPU devices to allocate per pod
  count: 1


vlm:
  image: "amdenterpriseai/aim-mistralai-mistral-small-3-2-24b-instruct-2506:0.11.1"

secrets:
  # VLM configuration
  VLM_TOKEN: ""
  VLM_MODEL_NAME: ""

uiImage:
  repository: "registry-1.docker.io/amdenterpriseai/image-aimsb-fintech-onboarding-ui"
  tag: "{{ .Chart.Version }}"

imagePullPolicy: Always
imagePullSecrets: []

storage:
  ephemeral:
    storageClassName: null
    quantity: 1Gi
  dshm:
    sizeLimit: 1Gi
