# Streamlit UI configuration
ui:
  enabled: true
  port: 8501

  image:
    repository: python
    tag: "3.13-slim"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP

  # HTTPRoute configuration (Gateway API)
  httpRoute:
    enabled: false
    gatewayName: https
    gatewayNamespace: kgateway-system

  # Test execution settings
  maxIterations: 20
  maxResultLength: 15000

  # SSE client timeout settings (seconds)
  sseConnectTimeout: 10
  sseReadTimeout: 120

  env:
    PYTHONUNBUFFERED: "1"

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

# Playwright MCP server configuration
playwrightMcp:
  enabled: true
  port: 8931
  image:
    repository: mcr.microsoft.com/playwright/mcp
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

llm:
  # Use existing LLM service or deploy a new one
  existingService: null

  # Change name override according to model name from image (aim-{model}:{version})
  image: "amdenterpriseai/aim-openai-gpt-oss-120b:0.10.0"
  nameOverride: openai-gpt-oss-120b

  storage:
    ephemeral:
      quantity: 512Gi
      storageClassName: mlstorage

kaiwo:
  enabled: false

# Labels for Kubernetes resources
metadata:
  labels:
    app.kubernetes.io/name: agentic-testing

resources:
  limits:
    cpu: "2"
    memory: "4Gi"
  requests:
    cpu: "1"
    memory: "2Gi"
