{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "release.fullname" . }}-ui
  labels:
    app.kubernetes.io/name: {{ include "release.name" . }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.ui.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "release.name" . }}
    app.kubernetes.io/component: ui
{{- end }}
