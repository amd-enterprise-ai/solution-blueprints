{{- if .Values.knowledgeMcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "release.fullname" . }}-knowledge-mcp
  labels:
    # app.kubernetes.io/name: {{ include "release.name" . }}
    app.kubernetes.io/instance: {{ include "release.fullname" . }}
    app.kubernetes.io/component: knowledge-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      # app.kubernetes.io/name: {{ include "release.name" . }}
      app.kubernetes.io/instance: {{ include "release.fullname" . }}
      app.kubernetes.io/component: knowledge-mcp
  template:
    metadata:
      labels:
        # app.kubernetes.io/name: {{ include "release.name" . }}
        app.kubernetes.io/instance: {{ include "release.fullname" . }}
        app.kubernetes.io/component: knowledge-mcp
    spec:
      # Init Container: Wait for DB & Models

      # Main Container: MCP Server
      containers:
        - name: mcp-server
          image: "{{ .Values.knowledgeMcp.image.repository }}:{{ .Values.knowledgeMcp.image.tag }}"
          imagePullPolicy: {{ .Values.knowledgeMcp.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir -r /app/requirements.txt && \
              python /app/mcp_server.py
          ports:
            - name: http
              containerPort: {{ .Values.knowledgeMcp.port }}
          env:
            - name: CHROMADB_URL
              value: {{ include "chromadb.url" . | quote }}
            - name: EMBEDDING_URL
              value: {{ printf "%s/embeddings" (include "embedding.baseUrl" .) | quote }}
            {{- range $key, $val := .Values.env_vars }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: code
              mountPath: /app
          resources:
            {{- toYaml .Values.knowledgeMcp.resources | nindent 12 }}
      volumes:
        - name: code
          configMap:
            name: {{ .Release.Name }}-agentic-rag-agentic-app-code
{{- end }}
