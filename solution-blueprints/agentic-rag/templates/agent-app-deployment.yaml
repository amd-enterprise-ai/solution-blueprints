{{- if .Values.agentApp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "release.fullname" . }}-agent-app
  labels:
    app.kubernetes.io/component: agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ include "release.fullname" . }}
      app.kubernetes.io/component: agent-app
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ include "release.fullname" . }}
        app.kubernetes.io/component: agent-app
    spec:
      containers:
        - name: agent-ui
          image: "{{ .Values.agentApp.image.repository }}:{{ .Values.agentApp.image.tag }}"
          imagePullPolicy: {{ .Values.agentApp.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir -r /app/requirements.txt && \
              cd /app && \
              uvicorn rag_app:app --host 0.0.0.0 --port {{ .Values.agentApp.service.port }}
          env:
            - name: MCP_URL
              value: {{ include "mcp-server.url" . | quote }}
            - name: VLLM_URL
              {{- $sub := dict "Values" (merge (dict) .Values.llm) "Release" .Release "Chart" (dict "Name" "llm") }}
              value: {{ include "aimchart-llm.url" $sub | quote }}
            - name: GRADIO_PORT
              value: {{ .Values.agentApp.service.port | quote }}
            - name: PYTHONPATH
              value: "/app"
            {{- range $key, $val := .Values.env_vars }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.agentApp.service.port }}
          volumeMounts:
            - name: code
              mountPath: /app
          resources:
            {{- toYaml .Values.agentApp.resources | nindent 12 }}
          {{- with .Values.agentApp.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentApp.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentApp.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: code
          configMap:
            name: {{ .Release.Name }}-agentic-rag-agentic-app-code
{{- end }}
