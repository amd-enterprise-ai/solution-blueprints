{{- if .Values.agentApp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "release.fullname" . }}-agent-app
  labels:
    app.kubernetes.io/component: agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ include "release.fullname" . }}
      app.kubernetes.io/component: agent-app
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ include "release.fullname" . }}
        app.kubernetes.io/component: agent-app
    spec:
      {{- $llmSub := dict "Values" (merge (dict) .Values.llm) "Release" .Release "Chart" (dict "Name" "llm") }}
      initContainers:
        - name: wait-for-dependencies
          image: alpine:latest
          command: ['sh', '-c']
          args:
            - |
              set -e
              apk add --no-cache curl >/dev/null
              VLLM_BASE="${VLLM_URL%/}"
              VLLM_BASE="${VLLM_BASE%/v1}"
              echo "Waiting for VLLM service ($VLLM_BASE/health)..."
              until curl -s -f -o /dev/null "$VLLM_BASE/health"; do sleep 5; done
              echo "VLLM service is up"

              MCP_BASE="${MCP_URL%/sse}"
              echo "Waiting for MCP server ($MCP_BASE/)..."
              until [ "$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 "$MCP_BASE/")" != "000" ]; do sleep 5; done
              echo "MCP server is up"
          env:
            - name: VLLM_URL
              value: {{ include "aimchart-llm.url" $llmSub | quote }}
            - name: MCP_URL
              value: {{ include "mcp-server.url" . | quote }}
      containers:
        - name: agent-ui
          image: "{{ .Values.agentApp.image.repository }}:{{ .Values.agentApp.image.tag }}"
          imagePullPolicy: {{ .Values.agentApp.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir -r /app/requirements.txt && \
              cd /app && \
              uvicorn rag_app:app --host 0.0.0.0 --port {{ .Values.agentApp.service.port }}
          env:
            - name: MCP_URL
              value: {{ include "mcp-server.url" . | quote }}
            - name: VLLM_URL
              value: {{ include "aimchart-llm.url" $llmSub | quote }}
            - name: EMBEDDING_URL
              value: {{ printf "%s/v1/embeddings" (include "embedding.baseUrl" .) | quote }}
              {{- if .Values.llm.apiKeySecretRef }}
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.apiKeySecretRef.name }}
                  key: {{ .Values.llm.apiKeySecretRef.key }}
            {{- else if .Values.llm.apiKey }}
            - name: VLLM_API_KEY
              value: {{ .Values.llm.apiKey | quote }}
            {{- end }}
            {{- if .Values.llm.model }}
            - name: VLLM_MODEL
              value: {{ .Values.llm.model | quote }}
            {{- end }}
            - name: GRADIO_PORT
              value: {{ .Values.agentApp.service.port | quote }}
            - name: PYTHONPATH
              value: "/app"
            {{- range $key, $val := .Values.env_vars }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.agentApp.service.port }}
          volumeMounts:
            - name: code
              mountPath: /app
          resources:
            {{- toYaml .Values.agentApp.resources | nindent 12 }}
          {{- with .Values.agentApp.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentApp.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentApp.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: code
          configMap:
            name: {{ .Release.Name }}-agentic-rag-agentic-app-code
{{- end }}
