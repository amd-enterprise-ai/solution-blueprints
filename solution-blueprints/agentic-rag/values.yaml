# 1. APPLICATION CONFIGURATION (MCP ARCHITECTURE)
http_route:
  enabled: false
  gateway:
    name: https
    namespace: envoy-gateway-system

metadata:
  labels: {}

# Global Environment variables for both Agent and Server
env_vars:
  USE_OPENAI_COMPATIBLE_EMBEDDINGS: "true"
  MAX_RETRIES: "3"
  INIT_RETRIES: "5"
  INITIAL_DELAY: "1.0"
  BACKOFF_FACTOR: "2.0"
  CHUNK_SIZE: "300"
  CHUNK_OVERLAP: "60"
  TOP_K_DOCS: "6"

# AGENT UI (Runs rag_app.py)
agentApp:
  enabled: true
  image:
    repository: python
    tag: "3.12"
    pullPolicy: Always
  service:
    port: 7860
  resources:
    requests: { cpu: "1", memory: "4Gi" }
    limits: { cpu: "1", memory: "4Gi" }
  storage:
    ephemeral:
      quantity: 20Gi
      storageClassName: mlstorage
    dshm:
      sizeLimit: 32Gi
  # Health Probes (Specific to FastAPI UI)
  startupProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 60
  livenessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 10

# MCP SERVER (Runs mcp_server.py)
knowledgeMcp:
  enabled: true
  port: 8000
  image:
    repository: python
    tag: "3.12"
    pullPolicy: Always
  resources:
    requests: { cpu: "1", memory: "2Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  storage:
    ephemeral:
      quantity: 10Gi
      storageClassName: mlstorage
  readinessProbe:
    httpGet:
      path: /sse  # Standard FastMCP endpoint
      port: 8000
    # Increase delay to account for 'pip install' and 'init_model' calls
    initialDelaySeconds: 120
    periodSeconds: 10
    # Increase threshold so it doesn't kill the pod while it's still installing
    failureThreshold: 10 # 10 * 10s = 100 seconds of total "warm-up" time
  startupProbe:
    httpGet:
      path: /sse
      port: 8000
    failureThreshold: 30 # 30 * 10s = 5 minutes of total "warm-up" time
    periodSeconds: 10

kaiwo:
  enabled: false

# 2. SUBCHART DEPENDENCIES:

# Values passed to the `llm` Subchart (aimchart-llm)
llm:
  nameOverride: aimsb-agentic-rag-llm
  service:
    enabled: true
    type: ClusterIP
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key
  storage:
    ephemeral:
      storageClassName: mlstorage
      quantity: 512Gi
  platformDefaults:
    instinct:
      image: "docker.io/amdenterpriseai/aim-openai-gpt-oss-20b:0.11.1"
    radeon:
      image: "docker.io/amdenterpriseai/aim-radeon-qwen-qwen3-vl-8b-instruct:0.12.0-preview"

# Values passed to the `embedding` Subchart (aimchart-embedding)
embedding:
  nameOverride: "aimchart-embedding"

# Values passed to the `chromadb` Subchart (aimchart-chromadb)
chromadb:
  metadata:
    labels: {}
  image:
    repository: "chromadb/chroma"
    tag: "1.3.5"
  resources:
    requests: { cpu: "1", memory: "4Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  deployment:
    ports:
      http: 8000
  persistence:
    enabled: true
    size: 25Gi
    storageClassName: mlstorage
