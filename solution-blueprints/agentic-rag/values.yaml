# 1. APPLICATION CONFIGURATION (MCP ARCHITECTURE)
http_route:
  enabled: false
  gateway:
    name: https
    namespace: kgateway-system

metadata:
  labels: {}

# Global Environment variables for both Agent and Server
env_vars:
  USE_OPENAI_COMPATIBLE_EMBEDDINGS: "true"
  MAX_RETRIES: "3"
  INIT_RETRIES: "5"
  INITIAL_DELAY: "1.0"
  BACKOFF_FACTOR: "2.0"
  CHUNK_SIZE: "1500"
  CHUNK_OVERLAP: "300"
  TOP_K_DOCS: "5"

# AGENT UI (Runs rag_app.py)
agentApp:
  enabled: true
  image:
    repository: python
    tag: "3.12"
    pullPolicy: Always
  service:
    port: 7860
  resources:
    requests: { cpu: "1", memory: "4Gi" }
    limits: { cpu: "1", memory: "4Gi" }
  storage:
    ephemeral:
      quantity: 20Gi
      storageClassName: mlstorage
    dshm:
      sizeLimit: 32Gi
  # Health Probes (Specific to FastAPI UI)
  startupProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 60
  livenessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 10

# MCP SERVER (Runs mcp_server.py)
knowledgeMcp:
  enabled: true
  port: 8000
  image:
    repository: python
    tag: "3.12"
    pullPolicy: Always
  resources:
    requests: { cpu: "1", memory: "2Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  storage:
    ephemeral:
      quantity: 10Gi
      storageClassName: mlstorage
  readinessProbe:
    httpGet:
      path: /sse  # Standard FastMCP endpoint
      port: 8000
    # Increase delay to account for 'pip install' and 'init_model' calls
    initialDelaySeconds: 120
    periodSeconds: 10
    # Increase threshold so it doesn't kill the pod while it's still installing
    failureThreshold: 10 # 10 * 10s = 100 seconds of total "warm-up" time
  startupProbe:
    httpGet:
      path: /sse
      port: 8000
    failureThreshold: 30 # 30 * 10s = 5 minutes of total "warm-up" time
    periodSeconds: 10

kaiwo:
  enabled: false

# 2. SUBCHART DEPENDENCIES:

# Values passed to the `llm` Subchart (aimchart-llm)
llm:
  service:
    enabled: true
    type: ClusterIP
  image: "amdenterpriseai/aim-openai-gpt-oss-20b:0.10.0"
  storage:
    ephemeral:
      storageClassName: mlstorage
      quantity: 512Gi

# Values passed to the `embedding` Subchart (aimchart-embedding)
embedding:
  metadata:
    labels: {}
  image: "michaelf34/infinity:0.0.70-amd-gfx942"
  model: "intfloat/multilingual-e5-large-instruct"
  gpus: 1
  resources:
    requests: { cpu: "2", memory: "32Gi" }
    limits: { cpu: "4", memory: "192Gi" }
  storage:
    ephemeral:
      quantity: 20Gi
    dshm:
      sizeLimit: 16Gi
  deployment:
    ports:
      http: 7997
    command:
      - infinity_emb
    args:
      - v1
      - server

# Values passed to the `chromadb` Subchart (aimchart-chromadb)
chromadb:
  metadata:
    labels: {}
  image:
    repository: "chromadb/chroma"
    tag: "1.3.5"
  resources:
    requests: { cpu: "1", memory: "4Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  deployment:
    ports:
      http: 8000
  persistence:
    enabled: true
    size: 25Gi
    storageClassName: mlstorage
