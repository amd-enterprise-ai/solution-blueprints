apiVersion: v1
kind: Service
metadata:
  name: {{ include "release.fullname" . }}
  labels:
    app: {{ include "release.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: docsum
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
  selector:
    app: {{ include "release.fullname" . }}
