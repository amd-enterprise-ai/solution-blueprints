http_route:
  enabled: false
  gateway:
    name: https
    namespace: envoy-gateway-system

# Proxy settings and shared resources
global:
  platform: instinct
  http_proxy: null
  https_proxy: null
  no_proxy: null

# LLM Service
llm:
  nameOverride: aimsb-docsum-llm
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key
  platformDefaults:
    instinct:
      image: "docker.io/amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1"
    radeon:
      image: "docker.io/amdenterpriseai/aim-radeon-qwen-qwen3-vl-8b-instruct:0.12.0-preview"
    epyc:
      image: "docker.io/amdenterpriseai/aim-epyc-meta-llama-llama-3-1-8b-instruct:0.13.0"
      gpus: 0
      # Fit weights + KV cache + overhead to avoid OOMKilled;
      memory: 128
      # cpus=188 keeps the LLM within a single NUMA node (EPYC 9965 = 192 cores/node, SMT off).
      cpus: 188
      env_vars:
        AIM_PRECISION: "bf16"
        AIM_ALLOW_UNOPTIMIZED: "true"

# Kaiwo Operator integration
kaiwo: { enabled: false }

# Tokenization Limits
maxInputTokens: "8192"
maxTotalTokens: "16384"

# Image settings
image:
  repository: "docker.io/amdenterpriseai/image-aimsb-docsum-application"
  tag: "{{ .Chart.Version }}"

imagePullPolicy: "Always"
imagePullSecrets: []

# Network
port: 8888
service:
  type: ClusterIP
  port: 8888

# --- UI Service ---
docsum-ui:
  enabled: true
  containerPort: 5173
  service: { type: "NodePort" }
  image:
    repository: "docker.io/amdenterpriseai/image-aimsb-docsum-ui"
    tag: "{{ .Chart.Version }}"
  resources:
    requests: { cpu: "150m", memory: "256Mi" }

# --- Deployment Settings ---
replicaCount: 1
nameOverride: null
fullnameOverride: null
metadata: { labels: {} }

# Pod Security
podAnnotations: {}
podSecurityContext: {}

# Container Security
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile: { type: "RuntimeDefault" }
  capabilities: { drop: [ "ALL" ] }

# --- Scheduling ---
nodeSelector: {}
tolerations: []
affinity: {}
resources: {}
