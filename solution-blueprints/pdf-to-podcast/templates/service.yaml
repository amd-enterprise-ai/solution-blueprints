{{ range $name, $svc := .Values.pythonServices }}
{{- if and $svc.enabled $svc.port }}
{{- $root := $ -}}
{{- $fullname := include "release.componentName" (dict "root" $root "name" $name) -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    app: {{ $fullname }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
  selector:
    app: {{ $fullname }}
{{ end }}
{{ end }}

{{ range $name, $svc := .Values.infraServices }}
{{- if and $svc.enabled $svc.ports }}
{{- $root := $ -}}
{{- $fullname := include "release.componentName" (dict "root" $root "name" $name) -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    app: {{ $fullname }}
spec:
  type: ClusterIP
  ports:
    {{- range $svc.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .port }}
    {{- end }}
  selector:
    app: {{ $fullname }}
{{ end }}
{{ end }}
