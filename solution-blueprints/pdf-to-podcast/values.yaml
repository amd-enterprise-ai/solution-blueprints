# Default values for pdf-to-podcast.
metadata:
  labels: {}

http_route:
  enabled: false
  gateway:
    name: https
    namespace: envoy-gateway-system

image:
  repository: "docker.io/amdenterpriseai/image-aimsb-pdf-to-podcast-application"
  tag: "{{ .Chart.Version }}"
imagePullPolicy: Always
imagePullSecrets: []
# Example:
# - name: my-registry-secret

uiImage:
  repository: "docker.io/amdenterpriseai/image-aimsb-pdf-to-podcast-ui"
  tag: "{{ .Chart.Version }}"

storage:
  ephemeral:
    quantity: 20Gi
    storageClassName: mlstorage
    accessModes:
      - ReadWriteOnce
  dshm:
    sizeLimit: 32Gi
  appStorage:
    quantity: 10Gi
    storageClassName: mlstorage
    accessModes:
      - ReadWriteMany
    existingClaim: ""

# startupProbe - checks if the container has successfully started. It disables liveness and readiness probes until it succeeds, useful for slow-starting applications.
# livenessProbe - checks if the container is still alive. If it fails, Kubernetes restarts the container to recover from failure.
# ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 360 # 360 x 10s => allow for 60 minutes startup time
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  failureThreshold: 1
  periodSeconds: 10

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

env_vars: {}

pythonServices:
  app:
    enabled: true
    run: uvicorn main:app --host 0.0.0.0 --port 8000 --ws auto
    port: 8000
    # Note: Code should be in Docker image, not ConfigMap
    # Build image with: docker build -t pdf-to-podcast-app:latest -f docker/application.Dockerfile .
    # APP_LLM_URL and APP_TTS_BASE_URL are automatically set from subchart service URLs in deployment template
    env:
      APP_API_KEY: ""
      APP_TTS_API_KEY: ""
      APP_TTS_BASE_URL: ""
      APP_CELERY_BROKER_URL: ""
      APP_CELERY_BACKEND_URL: ""
      APP_STORAGE_PATH: "/tmp/storage"

  celery-worker:
    enabled: true
    run: celery -A infrastructure.celery_client:celery_app worker --autoscale=20,4 --loglevel=info
    port: null
    # Note: Uses same Docker image as app service (includes torch and docling)
    # Build with: docker build -t pdf-to-podcast-app:latest -f docker/application.Dockerfile .
    # Resources are 2x higher than default to handle heavy PDF processing and LLM tasks
    resources:
      requests:
        cpu: "1"
        memory: "8Gi"
      limits:
        cpu: "4"
        memory: "16Gi"
    env:
      APP_API_KEY: ""
      APP_TTS_API_KEY: ""
      APP_TTS_BASE_URL: ""
      APP_CELERY_BROKER_URL: ""
      APP_CELERY_BACKEND_URL: ""
      APP_STORAGE_PATH: "/tmp/storage"

  frontend:
    enabled: true
    run: python -m app.ui
    port: 7860
    # Note: Code should be in Docker image, not ConfigMap
    # Build image with: docker build -t pdf-to-podcast-ui:latest -f docker/ui.Dockerfile .
    env:
      API_SERVICE_URL: ""
      DEFAULT_SPEAKER_1_NAME: "Ryan"
      DEFAULT_SPEAKER_2_NAME: "Aiden"
      DEFAULT_VOICE_SPEAKER_1: "Ryan"
      DEFAULT_VOICE_SPEAKER_2: "Aiden"

infraServices:
  redis:
    enabled: true
    image: redis:8.4-alpine
    ports:
      - name: redis
        port: 6379
    command: ["redis-server", "--appendonly", "no"]

llm:
  nameOverride: "aimsb-pdf-to-podcast-llm"
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key

  storage:
    ephemeral:
      storageClassName: mlstorage
      quantity: 512Gi
  platformDefaults:
    instinct:
      image: "docker.io/amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1"
    radeon:
      image: "docker.io/amdenterpriseai/aim-radeon-qwen-qwen3-vl-8b-instruct:0.12.0-preview"
