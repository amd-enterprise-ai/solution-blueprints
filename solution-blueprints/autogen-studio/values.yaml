image: python:3.10-bullseye

autogenstudio:
  pip: autogenstudio==0.4.2.2

llm:
  # Use existing external AIM service instead of deploying our own
  # Set to null or comment out to deploy own AIM service
  existingService: null

  nameOverride: llama33-70b-instruct
  # Configuration for deploying own AIM service (used when existingService is not set)
  image: "amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.10.0"
  env_vars:
    AIM_PRECISION: "fp8"

  storage:
    ephemeral:
      quantity: 512Gi
      storageClassName: mlstorage

kaiwo:
  enabled: false

http_route:
  enabled: true
  gateway:
    name: https
    namespace: kgateway-system

metadata:
  labels:
    app.kubernetes.io/name: autogenstudio

resources:
  limits:
    cpu: "2"
    memory: "4Gi"
  requests:
    cpu: "1"
    memory: "2Gi"

service:
  type: ClusterIP
  port: 8081

envVars:
  AUTOGENSTUDIO_APPDIR: "/app/"
  PYTHONUNBUFFERED: "1"
