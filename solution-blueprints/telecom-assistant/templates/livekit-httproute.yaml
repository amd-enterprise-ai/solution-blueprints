{{- if $.Values.livekit.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "release.fullname" . }}-livekit
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: https
      namespace: kgateway-system
  rules:
    - matches:
        - headers:
            - name: Host
              type: RegularExpression
              value: "livekit-{{ include "release.fullname" . }}\\..*"
          path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ printf "%s-livekit" .Release.Name | quote }}
          port: 80
          weight: 1
{{- end }}
