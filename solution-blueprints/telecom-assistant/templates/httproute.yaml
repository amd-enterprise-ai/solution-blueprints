{{ if .Values.http_route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "release.fullname" . }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.http_route.gateway.name | default "https" }}
      namespace: {{ .Values.http_route.gateway.namespace | default "envoy-gateway-system" }}
  rules:
    - matches:
        - headers:
            - name: Host
              type: RegularExpression
              value: {{ include "release.fullname" . }}\..*
          path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "release.componentName" (dict "root" . "name" "frontend") }}
          port: {{ .Values.mainServices.frontend.port | default 3000 }}
          weight: 1
      timeouts:
        backendRequest: 3600s
        request: 3605s
{{ end }}
