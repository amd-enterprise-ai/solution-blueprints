{{- range $name, $svc := .Values.mainServices }}
{{- if $svc.enabled }}
{{- $root := $ -}}
{{- $fullname := include "release.componentName" (dict "root" $root "name" $name) -}}
{{- $livekitHost := printf "%s-livekit" $.Release.Name -}}
{{- $livekitServicePort := 80 -}}
{{- $livekitWsUrl := printf "ws://%s:%v" $livekitHost $livekitServicePort -}}
{{- $stunnerEnabled := default false $.Values.stunner.enabled -}}
{{- $releaseFullname := include "release.fullname" $ -}}
{{- $httpRoute := default (dict) (index $.Values.livekit "httpRoute") -}}
{{- $httpHostSuffix := default "" (index $httpRoute "hostSuffix") | trimPrefix "." -}}
{{- $frontendWssHttpRouteAuto := printf "wss://livekit-%s.%s" $releaseFullname $httpHostSuffix -}}
{{- $env := merge (dict) (default (dict) $svc.env) -}}

{{- if eq $name "agent" }}
  {{- $urls := include "telecom.serviceUrls" (dict "root" $) | fromYaml -}}
  {{- $libredeskHost := include "release.componentName" (dict "root" $ "name" "libredesk") -}}
  {{- $libredeskPort := (index ($.Values.infraServices.libredesk.ports | first) "port") | default 9000 -}}
  {{- $libredeskUrl := printf "http://%s:%v" $libredeskHost $libredeskPort -}}
  {{- $bssGatewayUrl := printf "http://%s:%s"
        (include "release.componentName" (dict "root" $ "name" "bssgateway"))
        ($.Values.mainServices.bssgateway.port | toString) -}}
  {{- $redisHost := include "release.componentName" (dict "root" $ "name" "redis") -}}
  {{- $computed := dict
        "LLM_BASE_URL"   $urls.llm
        "STT_BASE_URL"   $urls.stt
        "TTS_BASE_URL"   $urls.tts
        "CHROMA_URL"     $urls.chromadb
        "EMBEDDINGS_URL" (printf "%s/v1" $urls.embedding)
        "VLM_BASE_URL"   $urls.vlm
        "BSSGATEWAY_URL" $bssGatewayUrl
        "LIVEKIT_URL"    $livekitWsUrl
        "LIBREDESK_URL"  $libredeskUrl
        "REDIS_HOST"     $redisHost
  -}}
  {{- $env = merge $env $computed -}}
{{- end }}

{{- if eq $name "frontend" }}
  {{- if or (not (hasKey $env "LIVEKIT_URL")) (eq (get $env "LIVEKIT_URL") "") }}

    {{- if $stunnerEnabled }}
      {{- if ne $httpHostSuffix "" }}
        {{- $_ := set $env "LIVEKIT_URL" $frontendWssHttpRouteAuto }}
      {{- else }}
        {{- fail "stunner.enabled=true requires livekit.httpRoute.hostSuffix or explicit mainServices.frontend.env.LIVEKIT_URL" }}
      {{- end }}
    {{- else }}
      {{- fail "mainServices.frontend.env.LIVEKIT_URL must be set to the external LiveKit WebSocket URL" }}
    {{- end }}

  {{- end }}

  {{- if or (not (hasKey $env "AGENT_URL")) (eq (get $env "AGENT_URL") "") }}
    {{- $agentHost := include "release.componentName" (dict "root" $ "name" "agent") }}
    {{- $agentPort := $.Values.mainServices.agent.port | toString }}
    {{- $_ := set $env "AGENT_URL" (printf "http://%s:%s" $agentHost $agentPort) }}
  {{- end }}

{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    app: {{ $fullname }}
    component: {{ $name }}
    chart: {{ $.Chart.Name }}
    {{- range $key, $value := $.Values.metadata.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $fullname }}
  template:
    metadata:
      labels:
        app: {{ $fullname }}
        component: {{ $name }}
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range $.Values.imagePullSecrets }}
        - name: {{ .name | quote }}
        {{- end }}
      {{- end }}
      {{- if eq $name "agent" }}
      {{- $urls := include "telecom.serviceUrls" (dict "root" $) | fromYaml -}}
      {{- $libredeskHost := include "release.componentName" (dict "root" $ "name" "libredesk") -}}
      {{- $libredeskPort := (index ($.Values.infraServices.libredesk.ports | first) "port") | default 9000 }}
      initContainers:
        {{- range $w := list
              (dict "name" "qwen-stt"  "url" (printf "%s/models" $urls.stt))
              (dict "name" "llm"       "url" (printf "%s/models" $urls.llm))
              (dict "name" "qwen-tts"  "url" (printf "%s/models" $urls.tts))
              (dict "name" "chromadb"  "url" (printf "%s/api/v2/heartbeat" $urls.chromadb))
              (dict "name" "embedding" "url" (printf "%s/v1/models" $urls.embedding))
              (dict "name" "vlm"       "url" (printf "%s/models" $urls.vlm)) }}
        {{- include "telecom.waitHttp" $w | nindent 8 }}
        {{- end }}
        {{- include "telecom.waitTcp" (dict "name" "livekit"   "host" $livekitHost   "port" $livekitServicePort "interval" 2) | nindent 8 }}
        {{- include "telecom.waitTcp" (dict "name" "libredesk" "host" $libredeskHost "port" $libredeskPort) | nindent 8 }}
      {{- end }}
      {{- if eq $name "frontend" }}
      initContainers:
        {{- include "telecom.waitTcp" (dict "name" "livekit" "host" $livekitHost "port" $livekitServicePort "interval" 2) | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          {{- if $svc.image }}
          image: "{{ $svc.image.repository }}:{{ tpl $svc.image.tag $ }}"
          {{- end }}
          imagePullPolicy: {{ default $.Values.imagePullPolicy $svc.imagePullPolicy | quote }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              cd /app
              {{ $svc.run }}
          env:
            {{- include "container.env" (dict "env" $env "root" $root) | nindent 12 }}
            {{- include "container.env" (dict "env" $.Values.env_vars "root" $root) | nindent 12 }}
          {{- if $svc.port }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          {{- end }}
          {{- if $svc.livenessProbe }}
          livenessProbe:
            {{- $svc.livenessProbe | toYaml | nindent 12 -}}
          {{- end }}
          {{- if $svc.startupProbe }}
          startupProbe:
            {{- $svc.startupProbe | toYaml | nindent 12 -}}
          {{- end }}
          resources:
            {{- toYaml (default $.Values.resources $svc.resources) | nindent 12 }}
          volumeMounts:
            {{- include "container.volumeMounts" . | nindent 12 }}
      volumes:
        {{- include "container.volumes" (dict "root" $root "name" $name) | nindent 8 }}
{{ end }}
{{ end }}
