{{- range $name, $svc := .Values.infraServices }}
{{- if $svc.enabled }}
{{- $root := $ -}}
{{- $fullname := include "release.componentName" (dict "root" $root "name" $name) -}}
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ $fullname }}

spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $fullname }}
  template:
    metadata:
      labels:
        app: {{ $fullname }}
    spec:
      {{- if eq $name "libredesk" }}
      {{- $dbHost := include "release.componentName" (dict "root" $ "name" "postgres") }}
      {{- $dbPort := $.Values.infraServices.libredesk.db.port }}
      {{- $redisHost := include "release.componentName" (dict "root" $ "name" "redis") }}
      {{- $redisPort := ((index $.Values.infraServices "redis").ports | first).port | default 6379 }}
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: [ "sh", "-c" ]
          args:
            - |
              echo "Waiting for LibreDesk Redis ({{ $redisHost }}:{{ $redisPort }})..."
              until redis-cli -h {{ $redisHost }} -p {{ $redisPort }} ping | grep -q PONG; do sleep 5; done
              echo "LibreDesk Redis is ready!"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Postgres({{ $dbHost }}:{{ $dbPort }})..."
              until nc -z {{ $dbHost }} {{ $dbPort }}; do
                echo "Postgres is not ready yet. Retry in 5 seconds..."
                sleep 5
              done
              echo "LibreDesk DB is up"
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ $svc.image }}
          imagePullPolicy: {{ default "IfNotPresent" $.Values.imagePullPolicy | quote }}
          {{- if $svc.command }}
          command: {{ toYaml $svc.command | nindent 10 }}
          {{- end }}
          {{- if $svc.args }}
          args: {{ toYaml $svc.args | nindent 10 }}
          {{- end }}
          {{- if $svc.env }}
          env:
            {{- include "container.env" (dict "env" $svc.env "root" $root) | nindent 12 }}
          {{- end }}
          ports:
            {{- range $svc.ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ default "TCP" .protocol }}
            {{- end }}
          {{- if $svc.livenessProbe }}
          livenessProbe:
            {{- $svc.livenessProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.readinessProbe }}
          readinessProbe:
            {{- $svc.readinessProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.volumeMounts }}
          volumeMounts:
            {{- tpl (toYaml $svc.volumeMounts) $root | nindent 12 }}
          {{- end }}
      {{- if $svc.volumes }}
      volumes:
        {{- tpl (toYaml $svc.volumes) $root | nindent 8 }}
      {{- end }}
{{ end }}
{{ end }}
