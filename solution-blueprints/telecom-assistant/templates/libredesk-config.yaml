{{- if $.Values.infraServices.libredesk.enabled }}
{{- $redisHost := include "release.componentName" (dict "root" $ "name" "redis") }}
{{- $redisPort := ((index $.Values.infraServices "redis").ports | first).port }}
{{- $dbHost := include "release.componentName" (dict "root" $ "name" "postgres") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: libredesk-config
data:
  config.toml: |
    [app]
    log_level = "info"
    env = "prod"
    check_updates = false
    encryption_key = "{{ $.Values.infraServices.libredesk.encryptionKey }}"

    [app.server]
    address = "0.0.0.0:{{ (index ($.Values.infraServices.libredesk.ports | first) "port") | default 9000 }}"
    socket = ""
    disable_secure_cookies = true
    read_timeout = "5s"
    write_timeout = "5s"
    max_body_size = 104857600
    read_buffer_size = 65536
    keepalive_timeout = "10s"

    [db]
    host = "{{ $dbHost }}"
    port = {{ $.Values.infraServices.libredesk.db.port | default 5432 }}
    user = "{{ $.Values.infraServices.libredesk.db.username }}"
    password = "{{ $.Values.infraServices.libredesk.db.password }}"
    database = "{{ $.Values.infraServices.libredesk.db.name }}"
    ssl_mode = "{{ $.Values.infraServices.libredesk.db.ssl_mode | default "disable" }}"
    max_open = 30
    max_idle = 30
    max_lifetime = "300s"

    [redis]
    address = "{{ $redisHost }}:{{ $redisPort }}"
    user = ""
    password = ""
    db = 0

    [message]
    outgoing_queue_workers = 10
    incoming_queue_workers = 10
    message_outgoing_scan_interval = "50ms"
    incoming_queue_size = 5000
    outgoing_queue_size = 5000

    [notification]
    concurrency = 2
    queue_size = 2000

    [automation]
    worker_count = 10

    [autoassigner]
    autoassign_interval = "5m"

    [webhook]
    workers = 5
    queue_size = 10000
    timeout = "15s"

    [conversation]
    unsnooze_interval = "5m"
    draft_retention_period = "360h"

    [sla]
    evaluation_interval = "5m"

    [upload]
    provider = "fs"

    [upload.fs]
    upload_path = "uploads"
{{ end }}
