http_route:
  enabled: false
  gateway:
    name: https
    namespace: envoy-gateway-system

metadata:
  labels: {}

image: "docker.io/library/python:3.12"
imagePullPolicy: Always

# Environment variables for the talk-to-your-documents application.
env_vars:
  USE_OPENAI_COMPATIBLE_EMBEDDINGS: "true"
  MAX_RETRIES: "3"
  INITIAL_DELAY: "1.0"
  BACKOFF_FACTOR: "2.0"
  CHUNK_SIZE: "300"
  CHUNK_OVERLAP: "60"
  TOP_K_DOCS: "6"

deployment:
  ports:
    http: 7860

resources:
  requests:
    cpu: "1"
    memory: "4Gi"
  limits:
    cpu: "1"
    memory: "4Gi"

storage:
  ephemeral:
    quantity: 20Gi
    storageClassName: mlstorage
  dshm:
    sizeLimit: 32Gi

startupProbe:
  httpGet: { path: /health, port: http }
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 60
livenessProbe:
  httpGet: { path: /health, port: http }
  periodSeconds: 10
readinessProbe:
  httpGet: { path: /health, port: http }
  periodSeconds: 10

kaiwo:
  enabled: false

global:
  platform: instinct

# -- Values passed to the `llm` Subchart (aimchart-llm) --

llm:
  nameOverride: "aimchart-llm"
  service:
    enabled: true
    type: ClusterIP
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key
  storage:
    ephemeral:
      storageClassName: mlstorage
      quantity: 512Gi
  platformDefaults:
    instinct:
      image: "docker.io/amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1"
    radeon:
      image: "docker.io/amdenterpriseai/aim-radeon-qwen-qwen3-vl-8b-instruct:0.12.0-preview"
    epyc:
      image: "docker.io/amdenterpriseai/aim-epyc-meta-llama-llama-3-1-8b-instruct:0.13.0"
      gpus: 0
      # Fit weights + KV cache + overhead to avoid OOMKilled;
      memory: 128
      # cpus=188 keeps the LLM within a single NUMA node (EPYC 9965 = 192 cores/node, SMT off).
      cpus: 188
      env_vars:
        AIM_PRECISION: "bf16"
        AIM_ALLOW_UNOPTIMIZED: "true"

embedding:
  nameOverride: "aimchart-embedding"
  platformDefaults:
    epyc:
      resources:
        requests:
          cpu: "32"
          memory: "32Gi"
        limits:
          cpu: "32"
          memory: "32Gi"

# -- Values passed to the `chromadb` Subchart (aimchart-chromadb) --

chromadb:
  metadata:
    labels: {}
  image:
    repository: "docker.io/chromadb/chroma"
    tag: "1.3.5"
  resources:
    requests: { cpu: "1", memory: "4Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  deployment:
    ports:
      http: 8000
  persistence:
    enabled: true
    size: 25Gi
    storageClassName: mlstorage
