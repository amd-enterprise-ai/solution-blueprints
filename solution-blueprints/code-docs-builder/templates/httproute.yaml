{{- if .Values.http_route.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "codedocs.fullname" . }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.http_route.gateway.name | default "https" }}
    namespace: {{ .Values.http_route.gateway.namespace | default "kgateway-system" }}
  rules:
  - matches:
    - headers:
      - name: Host
        type: RegularExpression
        # Matches "appname." followed by any characters
        value: {{ include "codedocs.fullname" . }}\..*
      path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "codedocs.fullname" . }}-frontend
      port: {{ .Values.frontend.port }}
      weight: 1
    timeouts:
      backendRequest: 3600s
      request: 3605s
{{- end }}
