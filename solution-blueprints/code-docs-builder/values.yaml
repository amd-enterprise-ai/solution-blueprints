http_route:
  enabled: false
  gateway:
    name: https
    namespace: envoy-gateway-system

backend:
  replicaCount: 1
  image: "docker.io/library/python:3.11-slim"
  port: 8091
  env:
    OPENAI_API_KEY: "dummy"

frontend:
  replicaCount: 1
  image: "docker.io/library/python:3.11-slim"
  port: 8092

global:
  platform: instinct

llm:
  # Use existing external AIM service instead of deploying our own
  # Set to null or comment out to deploy own AIM service
  existingService: null

  # Configuration for deploying own AIM service (used when existingService is not set)
  nameOverride: aimsb-codedocs-llm
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key

  platformDefaults:
    instinct:
      image: "docker.io/amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1"
    epyc:
      image: "docker.io/amdenterpriseai/aim-epyc-meta-llama-llama-3-1-8b-instruct:0.13.0"
      gpus: 0
      # Fit weights + KV cache + overhead to avoid OOMKilled;
      memory: 128
      # cpus=188 keeps the LLM within a single NUMA node (EPYC 9965 = 192 cores/node, SMT off).
      cpus: 188
      env_vars:
        AIM_PRECISION: "bf16"
        AIM_ALLOW_UNOPTIMIZED: "true"

  storage:
    ephemeral:
      quantity: 512Gi
      storageClassName: mlstorage
