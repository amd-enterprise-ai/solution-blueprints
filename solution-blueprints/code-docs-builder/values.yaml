http_route:
  enabled: false
  gateway:
    name: https
    namespace: kgateway-system

backend:
  replicaCount: 1
  image: "python:3.11-slim"
  port: 8091
  env:
    DOCUMENTATION_AGENTS_CONFIG: "/workload/mount/CodeDocsBackend/config/documentation/agents.yaml"
    DOCUMENTATION_TASKS_CONFIG: "/workload/mount/CodeDocsBackend/config/documentation/tasks.yaml"
    PLANNER_AGENTS_CONFIG: "/workload/mount/CodeDocsBackend/config/roadmap/agents.yaml"
    PLANNER_TASKS_CONFIG: "/workload/mount/CodeDocsBackend/config/roadmap/tasks.yaml"
    OPENAI_API_KEY: "dummy"

frontend:
  replicaCount: 1
  image: "python:3.11-slim"
  port: 8092

llm:
  # Use existing external AIM service instead of deploying our own
  # Set to null or comment out to deploy own AIM service
  existingService: null

  # Configuration for deploying own AIM service (used when existingService is not set)
  nameOverride: llama33-70b-instruct
  image: "amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.8.5-preview"

  env_vars:
    AIM_ENGINE_ARGS: >-
      {"enable-auto-tool-choice": null, "tool-call-parser": "llama3_json"}

  storage:
    ephemeral:
      quantity: 512Gi
      storageClassName: mlstorage
