http_route:
  enabled: false
  gateway:
    name: https
    namespace: kgateway-system

backend:
  replicaCount: 1
  image: "python:3.11-slim"
  port: 8091
  env:
    OPENAI_API_KEY: "dummy"

frontend:
  replicaCount: 1
  image: "python:3.11-slim"
  port: 8092

llm:
  # Use existing external AIM service instead of deploying our own
  # Set to null or comment out to deploy own AIM service
  existingService: null

  # Configuration for deploying own AIM service (used when existingService is not set)
  nameOverride: llama33-70b-instruct
  image: "amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1"
  env_vars:
    AIM_PRECISION: "fp8"
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key

  storage:
    ephemeral:
      quantity: 512Gi
      storageClassName: mlstorage
