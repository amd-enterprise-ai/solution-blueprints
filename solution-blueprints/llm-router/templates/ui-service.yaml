apiVersion: v1
kind: Service
metadata:
  name: {{ include "router.complexName" . }}-ui
  namespace: {{ .Release.namespace }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.ports.ui }}
      targetPort: {{ .Values.ports.ui }}
  selector:
    app: {{ include "router.complexName" . }}-ui
