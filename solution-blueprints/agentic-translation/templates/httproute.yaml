{{- if .Values.http_route.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "release.fullname" . }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.http_route.gateway.name | default "https" }}
    namespace: {{ .Values.http_route.gateway.namespace | default "kgateway-system" }}
  rules:
  # --- API component (Health, Readiness, and Translate)
  - matches:
    - path: { type: PathPrefix, value: /health }
      headers:
      - name: Host
        type: RegularExpression
        value: {{ include "release.fullname" . }}\..*
    - path: { type: PathPrefix, value: /readiness }
      headers:
      - name: Host
        type: RegularExpression
        value: {{ include "release.fullname" . }}\..*
    - path: { type: PathPrefix, value: /translate }
      headers:
      - name: Host
        type: RegularExpression
        value: {{ include "release.fullname" . }}\..*
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "release.fullname" . }}
      port: {{ .Values.deployment.ports.api }}
    timeouts:
      backendRequest: 3600s
      request: 3605s

  # --- UI component (Catch-all)
  - matches:
    - path: { type: PathPrefix, value: / }
      headers:
      - name: Host
        type: RegularExpression
        value: {{ include "release.fullname" . }}\..*
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "release.fullname" . }}
      port: {{ .Values.deployment.ports.ui }}
      weight: 1
    timeouts:
      backendRequest: 3600s
      request: 3605s
{{- end }}
