apiVersion: v1
kind: Service
metadata:
  name: {{ include "release.fullname" . }}
  labels:
    app: {{ include "release.fullname" . }}
spec:
  type: ClusterIP
  ports:
    {{ range $name, $port := .Values.deployment.ports }}
    {{- if eq $name "ui" }}
    {{- if $.Values.enableUI }}
    - name: {{ $name }}
      port: {{ $.Values.deployment.ports.ui }}
      targetPort: {{ $port }}
    {{- end }}
    {{- else }}
    - name: {{ $name }}
      port: {{ $port }}
      targetPort: {{ $port }}
    {{- end }}
    {{- end }}
  selector:
    app: {{ include "release.fullname" . }}
