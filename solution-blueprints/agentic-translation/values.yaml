# Default values for agentic-translation.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
metadata:
  labels: {}

image:
  repository: "docker.io/amdenterpriseai/image-aimsb-agentic-translation-application"
  tag: "{{ .Chart.Version }}"
imagePullPolicy: Always
imagePullSecrets: []
# Example:
# - name: my-registry-secret

enableUI: true

storage:
  ephemeral:
    quantity: 20Gi
    storageClassName: mlstorage
    accessModes:
      - ReadWriteOnce
  dshm:
    sizeLimit: 32Gi

deployment:
  ports:
    api: 5000  # API backend and health checks (health and readiness)
    ui: 8501

# startupProbe - checks if the container has successfully started. It disables liveness and readiness probes until it succeeds, useful for slow-starting applications.
# livenessProbe - checks if the container is still alive. If it fails, Kubernetes restarts the container to recover from failure.
# readinessProbe - checks if the container is ready to serve traffic. If it fails, the container is removed from the service's endpoints but remains running.
# ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: api
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 360 # 360 x 10s => allow for 60 minutes startup time
livenessProbe:
  httpGet:
    path: /health
    port: api
  failureThreshold: 1
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /readiness
    port: api
  initialDelaySeconds: 10
  failureThreshold: 1
  periodSeconds: 10

# kaiwo settings (if enabled, use kaiwo CRDs to have kaiwo operator manage the workload)
kaiwo:
  enabled: false

http_route:
  enabled: false
  gateway:
    name: https
    namespace: envoy-gateway-system

llm:
  nameOverride: aimsb-agentic-translation-llm
  model: ""  # If connecting to an external LLM service, optionally specify model to use
  apiKey: "" # If connecting to an external LLM service, optionally specify an API key
  apiKeySecretRef: {}
  # You may alternatively provide an API key that's stored in a Secret called `my-secretname` in the key `api-key` by adding:
  # apiKeySecretRef:
  #   name: my-secretname
  #   key: api-key

  storage:
    ephemeral:
      storageClassName: mlstorage
      quantity: 512Gi
  platformDefaults:
    instinct:
      image: "docker.io/amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1"
    radeon:
      image: "docker.io/amdenterpriseai/aim-radeon-qwen-qwen3-vl-8b-instruct:0.12.0-preview"
