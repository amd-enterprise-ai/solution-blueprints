version: 1
name: coding-agent-native

# Native AXIS backend (Landlock + seccomp + netns) with block-mode networking,
# for running gateway on an UNPRIVILEGED Strix Halo deskside:
# no lxc-exec, no CAP_NET_ADMIN, no writable cgroups v2. This is the deskside
# counterpart to the repo's privileged coding-agent.yaml. Point AXIS_POLICY here
# on Halo (platforms/halo/env.sh does this for you).
runtime:
  provider: axis_native

filesystem:
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc
  read_write:
    - "{workspace}"
    - "{tmpdir}"
  # Named denies belt-and-braces over Landlock default-deny (see REDTEAM_FINDINGS.md
  # RT-001/RT-002): credential stores an agent must never read.
  deny:
    - "~/.ssh"
    - "~/.gnupg"
    - "~/.aws"
    - "~/.git-credentials"
    - "~/.netrc"
    - "~/.docker/config.json"
    - "~/.kube/config"
    # Daemon sockets: talking to the docker/containerd daemon is equivalent to
    # host root (spawn a privileged container mounting /). An agent tool call
    # never needs it, so deny open() to these paths.
    - "/var/run/docker.sock"
    - "/run/docker.sock"
    - "/var/run/containerd/containerd.sock"
    - "/run/containerd/containerd.sock"
  compatibility: best_effort

process:
  # 0 = no cgroups-based limit requested (avoids the writable-cgroups-v2
  # requirement on a shared Halo box; AXIS fails closed if it can't enforce a
  # requested limit). The connector applies a userspace ulimit -u fallback
  # instead — see AXIS_ULIMIT_NPROC and REDTEAM_FINDINGS.md RT-007.
  max_processes: 0
  max_memory_mb: 0
  cpu_rate_percent: 0
  blocked_syscalls:
    - ptrace
    - mount
    - bpf
    - io_uring_setup

network:
  mode: block
