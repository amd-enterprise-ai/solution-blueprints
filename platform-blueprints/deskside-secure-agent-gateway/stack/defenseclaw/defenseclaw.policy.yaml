# DefenseClaw gateway config for the client-side integration.
#
# This is a minimal $DEFENSECLAW_HOME/config.yaml. The gateway fills every
# unset field from its compiled defaults (internal/config/defaults.go), so we
# only override what the integration needs:
#
#   guardrail.mode: action   -> a HIGH/CRITICAL finding actually BLOCKS the
#                               tool call (in observe mode the gateway downgrades
#                               block->allow and only sets would_block).
#   gateway.api_port: 18970  -> the REST API the connector's DefenseClawClient
#                               POSTs /api/v1/inspect/tool to.
#
# The runtime guardrails we rely on are DefenseClaw's compiled-in rule packs
# (internal/gateway/rules.go), which already flag, at CRITICAL/HIGH severity:
#   PATH-SSH-KEY     reading id_rsa / id_ed25519 / id_ecdsa / id_dsa
#   PATH-SSH-DIR     touching ~/.ssh/
#   PATH-AWS-CREDS   reading ~/.aws/credentials
#   PATH-GIT-CREDS   reading ~/.git-credentials
#   CMD-REVSHELL-*   reverse shells (/dev/tcp, nc -e, python socket)
#   CMD-PIPE-CURL    curl ... | bash   (download-and-exec)
#   CMD-RM-RF        rm -rf of a critical root path
#   CMD-ETC-WRITE    write redirect into /etc/
#   SEC-*            inline credential material (AWS/GitHub/Anthropic/… keys)
# so the DENY/BLOCK integration step trips a real built-in rule, not a stub.

guardrail:
  mode: action
  scanner_mode: both
  # No external LLM judge in this client-side setup (CPU node, no cloud key);
  # regex + CodeGuard rule packs are enough to demonstrate admission control.
  detection_strategy: regex_only

gateway:
  host: 127.0.0.1
  api_port: 18970
