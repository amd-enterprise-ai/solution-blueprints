# router_test — vLLM Semantic Router config (CONSULT-ONLY).
#
# The difficulty-based decisions and
# signals are kept VERBATIM (same threshold, same hard/easy candidate sets) —
# only the model NAMES are renamed to the client-side tiers:
#   - LOCAL    : lemonade-local     -> local Lemonade (Qwen3-8B-GGUF, CPU, :13305)
#   - FRONTIER : claude-opus-4-8    -> Anthropic-compatible gateway
#
# The proxy does NOT run Envoy/ExtProc. It only
# CONSULTS the standalone classify API (POST /api/v1/classify/intent), which
# returns recommended_model / routing_decision / matched_signals.complexity for a
# prompt WITHOUT running any inference. So the only fields that matter here are the
# model names, the decisions/signals, and the embedding model paths. No real
# backend is ever called by the classify API, so backend_refs are nominal.
#
# NO SECRETS HERE: the frontier key is read by the proxy at runtime from the
# environment (FRONTIER_AUTH_KEY / GATEWAY_KEY), never from this file.
version: v0.3

# No inbound listener: we run ./bin/router with -api-port only (classify API).
listeners: []

providers:
  defaults:
    default_model: lemonade-local
  models:
    # ---- LOCAL (baseline + simple route) -----------------------------------
    - name: lemonade-local
      provider_model_id: lemonade-local
      api_format: openai
      pricing:
        currency: USD
        prompt_per_1m: 0.0
        completion_per_1m: 0.0
      backend_refs:
        - name: local-lemonade
          endpoint: 127.0.0.1:13305
          protocol: http
          weight: 100
          type: chat
    # ---- FRONTIER (Claude via an Anthropic-compatible gateway) -------------
    # The model NAME must start with "claude-" so the proxy maps it to the
    # frontier tier (SemanticRouterClient#tierFor).
    - name: claude-opus-4-8
      provider_model_id: claude-opus-4-8
      api_format: anthropic
      pricing:
        currency: USD
        prompt_per_1m: 15.0
        completion_per_1m: 75.0
      backend_refs:
        - name: frontier-gateway
          provider: anthropic
          base_url: https://<llm-gateway>/Anthropic
          protocol: https
          weight: 100
          api_key_env: FRONTIER_AUTH_KEY

routing:
  modelCards:
    - name: lemonade-local
      modality: text
    - name: claude-opus-4-8
      modality: text
  # Routing is DIFFICULTY-based, not subject-based: the prompt is embedded and
  # compared (cosine) to the `needs_reasoning` hard/easy candidate sets below.
  # A "hard" verdict -> frontier (Claude); "easy" -> local (Lemonade).
  decisions:
    # Policy: escalate to frontier unless the prompt is CLEARLY simple. The
    # complexity signal = cos(prompt, hard) - cos(prompt, easy); with threshold
    # 0.10 the band is: signal > 0.10 -> hard, < -0.10 -> easy, else medium.
    # Simple factual prompts land well below -0.10 (clearly easy); every
    # reasoning prompt lands at medium or hard, so both route here.
    - name: frontier-reasoning
      description: Hard multi-step reasoning, proofs, algorithm design, planning.
      priority: 200
      rules:
        operator: OR
        conditions:
          - type: complexity
            name: needs_reasoning:hard
          - type: complexity
            name: needs_reasoning:medium
      modelRefs:
        - model: claude-opus-4-8
          use_reasoning: false
          weight: 100
    - name: local-simple
      description: Simple factual lookups and short single-fact answers.
      priority: 100
      rules:
        operator: OR
        conditions:
          - type: complexity
            name: needs_reasoning:easy
      modelRefs:
        - model: lemonade-local
          use_reasoning: false
          weight: 100
  signals:
    complexity:
      - name: needs_reasoning
        threshold: 0.10
        description: >-
          Escalate multi-step reasoning, proofs, algorithm design, and
          multi-constraint planning to the frontier tier; keep quick factual
          lookups local.
        hard:
          candidates:
            - prove this statement step by step with a rigorous argument
            - design an algorithm and explain why it is correct
            - plan a multi-step sequence of actions and justify each step
            - solve this complex problem showing every reasoning step
            - compare multiple tradeoffs and analyze the root cause
        easy:
          candidates:
            - quick factual lookup with a short single-fact answer
            - define a term in one sentence
            - simple unit conversion
            - what is the capital of a country
            - what year did a historical event happen

global:
  model_catalog:
    embeddings:
      semantic:
        use_cpu: true
        # Native (candle) CPU embedding model fetched by `make download-models`
        # Run with ./bin/router (NOT router-onnx).
        mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
        bert_model_path: models/mom-embedding-light
    modules:
      classifier:
        domain:
          enabled: false
        pii:
          enabled: false
      hallucination_mitigation:
        enabled: false
      prompt_guard:
        enabled: false
      feedback_detector:
        enabled: false
  router:
    config_source: file
    strategy: priority
    auto_model_names:
      - auto
      - vllm-sr/auto
  stores:
    semantic_cache:
      enabled: false
